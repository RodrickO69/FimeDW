<!Doctype html>
<html lang="es">

<head>
  <title>Top de la semana</title>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: rgba(215, 250, 250, 0.582);
  }
  h1{
    text-align: center; color: #333;
  }
  input [type="radio"]{
    display: none;
  }
  .card-item{
    display: block;}
    #norte:checked ~.cards .norte,
    #sur:checked ~.cards .sur,
    #este:checked ~.cards .este,
    #oeste:checked ~.cards .oeste
    {display: block;}

    #norte:checked ~.cards .card-item:not(.norte),
    #sur:checked ~.cards .card-item:not(.sur),
    #este:checked ~.cards .card-item:not(.este),
    #oeste:checked ~.cards .card-item:not(.oeste)
    {display: none;}

    #todas:checked ~.cards .card-item{
      display: block;
    }
</style>
  </head>
  <body>
    <h1>Top de la semana - Ordenes</h1>
    <br>
    <div class="container-fluid">
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button clas="btn btn-outline-sucess" type="submit">Buscar orden</button>
      </form>
    </div>
    <input type="radio" name="filtro" id="todas" checked>
    <input type="radio" name="filtro" id="norte">
    <input type="radio" name="filtro" id="sur">
    <input type="radio" name="filtro" id="este">
    <input type="radio" name="filtro" id="oeste">

    <div class="text-center my-4">
      <label for="todas" class="btn btn-outline-info active">Todas</label>
      <label for="norte" class="btn btn-outline-info">Norte</label>
      <label for="sur" class="btn btn-outline-info">Sur</label>
      <label for="este" class="btn btn-outline-info">Este</label>
      <label for="oeste" class="btn btn-outline-info">Oeste</label>
    </div>
    <div class="container cards">
      <div class="row g-4">

    <div class="col-md-3 card-item norte">
      <div class="card">
        <img src="cables.jpeg" class="card-img-top" alt="cables">
        <div class="card-body">
          <h5 class="card-title">Orden 1</h5>
          <p class="card-text"></p>
          </div>
         </div>
       </div>
       <div class="col card-item sur">
        <div class="card">
          <img src="herramientas man.jpg" class="card-img-top" alt="herramientas">
          <div class="card-body">
            <h5 class="card-title">Orden 2</h5>
            <p class="card-text"></p>
          </div>
        </div>
      </div>
    
    <div class="col card-item este">
      <div class="card">
        <img src="equipo seguridad.webp" class="card-img-top" alt="seguridad">
        <div class="card-body">
          <h5 class="card-title">Orden 3</h5>
          <p class="card-text"></p>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="card card-item oeste">
          <img src="medicion2.png" class="card-img-top" alt="medicion">
          <div class="card-body">
            <h5 class="card-title">Orden 4</h5>
            <p class="card-text"></p>
          </div>
        </div> </div></div></div>
    </body>
  </html>
