<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Practica 4</title>
  <style>
    .producId{
      width: 350px;
      margin: 0 auto;
      margin-top: 5rem;
      border: 1px solid#ccc;
      border-radius: 10px;
      box-shadow: 0 4px 10px;
      padding: 20px;
      font-family: sans-serif;
      overflow: hidden;
          
    }
    .header{
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: -20px -20px 20px -20px;
      padding: 15px;
      text-align: center;
      color: whitesmoke;
    }
    p{
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 15px ;
    }
    img{
      float: left;
      width: 80px;
      margin-right: 5px;
      border-radius: 15px;
    }
    .precio{
      display: block;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bold;
      font-size: 1.7rem;
      margin: 15px, 0;
      clear: both;
    }
    .btn{
      display: block;
      text-align: center; color: yellow;
      padding: 10px;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
      
    }
    .btn:link{background: #28a745; color: white;}     
    .btn:visited{background: #1e7334;}
    .btn:hover{background: #218838;}
    .btn:active{background: #155724;}

  </style>
</head>
  
<body>
  <div class="producId">
  <div class="header">
    <h3>Reloj inteligente</h3>
  </div>
  <img src="Fralugio_GS_Sonic_2.webp">
  <p>Reloj inteligente marca Fralugio</p>
  <span class="precio">$1250.00</span>
  <a href="#" class="btn">Comprar</a>
</div>
</body>
<br>
<br>
 <footer class="f">© Rodrigo Rojas Ortiz</footer>
</html>
